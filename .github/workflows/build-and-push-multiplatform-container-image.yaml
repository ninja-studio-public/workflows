name: Publish Multi-Platform Container Image to GHCR
 
# workflow_version: 1.5.0 Dated 01 May 2026
# Defaults to creating both linux/amd64 and linux/arm64 docker images

on:
  workflow_call:
    inputs:
      repository:
        description: The repository name. This is used for code checkout as well as as a prefix for the name of the image. For example, "project-tango".
        required: true
        type: string
      service:
        description: The name of the service (frontend, backend etc). This is used to guide build context.
        required: true
        type: string
      version:
        description: The version of the image. This is used to tag the image.
        required: true
        type: string
      use_root_context:
        description: 'Use root context for shared resources'
        required: false
        type: boolean
        default: false      
      platforms:
        description: Comma-separated list of target platforms. For example, "linux/amd64,linux/arm64".
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      build_timeout_minutes:
        description: 'Maximum number of minutes the build-and-push step is allowed to run before being cancelled. Prevents runaway runner usage. Defaults to 60 minutes.'
        required: false
        type: number
        default: 2
         
         
env:  
  IMAGE_NAME: ${{ inputs.repository }}/${{ inputs.service }}
permissions:
  contents: write
  packages: write
  pull-requests: read
jobs:
  build-and-push:
    name: Build Container Image and Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository }}
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Case handling for image name
              #required for repos with uppercase letters in their name
        id: image-name
        run: |
          lower_image_name=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "lower_image_name=${lower_image_name}" >> $GITHUB_OUTPUT
      - name: Print Image Tags and platforms
        run: |
          echo "Image will be tagged as:"
          echo "${{ steps.image-name.outputs.lower_image_name }}:${{ inputs.version }}"
          echo "${{ steps.image-name.outputs.lower_image_name }}:latest"
          echo "Docker platforms for which image is being created:"
          echo "${{ inputs.platforms }}"

      - name: Build and push docker image to ghcr.io
        id: build
        uses: docker/build-push-action@v7
        timeout-minutes: ${{ inputs.build_timeout_minutes }}
        with:
          context: ${{ inputs.use_root_context == true && '.' || format('./{0}', inputs.service) }}
          file: ./${{ inputs.service }}/Dockerfile
          push: true
          platforms: ${{ inputs.platforms }}          
          tags: |
            ghcr.io/${{ steps.image-name.outputs.lower_image_name }}:${{ inputs.version }}
            ghcr.io/${{ steps.image-name.outputs.lower_image_name }}:latest

      - name: Report build outcome on failure
        if: steps.build.outcome == 'cancelled' || steps.build.outcome == 'timed_out' || steps.build.outcome == 'failure'
        run: |
          echo "::warning::Build step ended with outcome: ${{ steps.build.outcome }}"
          {
            echo "> [!CAUTION]"
            echo "> ❌ The build step ended with outcome: \`${{ steps.build.outcome }}\`"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Outcome | \`${{ steps.build.outcome }}\` |"
            echo "| Image | \`ghcr.io/${{ steps.image-name.outputs.lower_image_name }}\` |"
            echo "| Version | \`${{ inputs.version }}\` |"
            echo "| Platforms | \`${{ inputs.platforms }}\` |"
            echo "| Timeout limit | \`${{ inputs.build_timeout_minutes }} min\` |"
          } >> $GITHUB_STEP_SUMMARY